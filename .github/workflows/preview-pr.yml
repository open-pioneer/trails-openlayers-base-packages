name: Preview PR

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: read

jobs:
  wait:
    name: Wait for checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # This job simply waits for the test-and-build checks to complete.
      # test-and-build runs on the pull_request event (for both same-repo and fork PRs);
      # this workflow (pull_request_target) then deploys the resulting build artifact as a preview.
      # If you know a smarter way, let us now.
      - name: Wait for other checks to succeed
        uses: lewagon/wait-on-check-action@1d57e2c51a58d812d2765e036a028b6bdb5a6154 # v1.8.1
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          check-name: "Build samples and documentation"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10

  deploy:
    name: Preview PR
    runs-on: ubuntu-latest
    concurrency: preview-${{ github.ref }}
    timeout-minutes: 5
    needs: wait
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          # https://github.com/JamesIves/github-pages-deploy-action/issues/1928#issuecomment-3635092712
          persist-credentials: false

      - name: Download latest build artifact
        run: |
          # Both same-repo and fork PRs build via the pull_request-triggered test-and-build run.
          WORKFLOW_RUN=$(gh run list -c ${{ github.event.pull_request.head.sha }} -w "test-and-build.yml" -e pull_request --json databaseId --limit 1 | jq .[0].databaseId -r)
          echo "Latest workflow run: $WORKFLOW_RUN"

          mkdir site && cd site;

          echo "Downloading build artifact"
          gh run download $WORKFLOW_RUN -n build
          echo "Download successful:"
          ls -alh
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Deploy PR Preview
        uses: open-pioneer/trails-repo-automation/.github/actions/deploy-pr-preview@417c824a6aab4deea1edaa18e3a8b16f94c44594 # main
        with:
          src-repo: "openlayers-base-packages"
          token: ${{ secrets.DEMO_DEPLOY_TOKEN }}
