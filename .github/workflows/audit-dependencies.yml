name: Audit dependencies (daily)

on:
  workflow_dispatch:

  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: read

jobs:
  audit-dependencies:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install
        uses: open-pioneer/trails-repo-automation/.github/actions/install@3e0709264e6cb50fb00af3bf97d0b05bd0024591 # main
      - name: Audit dependencies
        run: pnpm audit
