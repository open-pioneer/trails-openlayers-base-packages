name: Audit dependencies (daily)

on:
  workflow_dispatch:

  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: read

jobs:
  audit-dependencies:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install
        uses: open-pioneer/trails-repo-automation/.github/actions/install@799b38eabbb77b18ff1d9177630fd7920e86433d # main
      - name: Audit dependencies
        run: pnpm audit
