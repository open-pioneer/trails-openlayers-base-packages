name: Publish snapshot

on:
  workflow_dispatch:
    inputs:
      snapshot-tag:
        type: string
        description: Name of the snapshot build tag. Use "dev" for the main branch and "dev-XYZ" for other branches.
        default: dev
        required: true

permissions:
  contents: read

jobs:
  build_packages:
    name: "Build and publish"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install
        uses: open-pioneer/trails-repo-automation/.github/actions/install@417c824a6aab4deea1edaa18e3a8b16f94c44594 # main

      - name: "Publish packages"
        uses: open-pioneer/trails-repo-automation/.github/actions/publish-snapshots@417c824a6aab4deea1edaa18e3a8b16f94c44594 # main
        with:
          snapshot-tag: ${{ inputs.snapshot-tag }}
          npm-token: ${{ secrets.NPM_TOKEN }}
