name: Build and deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  # Performs quality checks
  checks:
    name: "Run quality checks"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install
        uses: open-pioneer/trails-repo-automation/.github/actions/install@885300a1d435f5341fe732c0cef9351c45c615b7 # main

      - name: Run tests
        run: pnpm ci:test

  # Builds samples and documentation and uploads contents of ./dist/ as an artifact ("build")
  build_site:
    name: "Build samples and documentation"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install
        uses: open-pioneer/trails-repo-automation/.github/actions/install@885300a1d435f5341fe732c0cef9351c45c615b7 # main

      - name: Build samples
        run: pnpm build

      - name: Build API documentation
        if: github.ref == 'refs/heads/main'
        run: pnpm build-docs

      - name: Create license report
        run: pnpm build-license-report;

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: build
          path: dist/
          retention-days: ${{ github.ref == 'refs/heads/main' && 7 || 1 }}

  # Builds all publishable packages
  build_packages:
    name: "Build packages"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install
        uses: open-pioneer/trails-repo-automation/.github/actions/install@885300a1d435f5341fe732c0cef9351c45c615b7 # main

      - name: Build packages
        run: pnpm build-packages

  # Publishes packages using changesets
  version:
    if: github.ref == 'refs/heads/main'
    name: "Publish or create version PR"
    uses: "./.github/workflows/version.yml"
    needs:
      - checks
      - build_packages
    permissions:
      contents: write
      pull-requests: write
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Deploys demo site
  deploy:
    if: github.ref == 'refs/heads/main'
    name: "Deploy site"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - checks
      - build_site
      - version
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          # https://github.com/JamesIves/github-pages-deploy-action/issues/1928#issuecomment-3635092712
          persist-credentials: false

      - name: Load artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: build
          path: dist/

      - name: Assemble site
        run: |
          set -eux;

          mkdir -p site;
          touch site/.nojekyll;
          mv dist/www/* site/;
          mv dist/docs site/docs;

      - name: Deploy
        uses: open-pioneer/trails-repo-automation/.github/actions/deploy-demo@885300a1d435f5341fe732c0cef9351c45c615b7 # main
        with:
          src-repo: openlayers-base-packages
          target-path: ${{ needs.version.outputs.published == 'true' && 'latest' || 'dev' }}
          token: ${{ secrets.DEMO_DEPLOY_TOKEN }}
